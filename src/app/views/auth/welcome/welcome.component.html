<section class="welcome">
  <app-carousel
  [currentIndex]="currentIndex"
  [carouselItems]="itensCarousel"
  [optionalClick]="false"
  (nextSlideEvent)="toAdvance()">
  </app-carousel>

  <div class="welcome-footer">
    <div class="welcome-footer__buttons">
      <button class="w-full bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg font-sans" (click)="toAdvance()">
        Continuar
      </button>
    </div>
  </div>
</section>
