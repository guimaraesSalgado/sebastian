<section class="welcome">
  <app-s-carousel
  [currentIndex]="currentIndex"
  [carouselItems]="itensCarousel"
  [optionalClick]="false">
  </app-s-carousel>

  <div class="welcome-footer">
    <div class="welcome-footer__buttons">
      <app-s-button type="inline" (click)="toJump()" size="full">Pular</app-s-button>
      <app-s-button type="dark" (click)="toAdvance()" size="full">Continuar</app-s-button>
    </div>
  </div>
</section>
